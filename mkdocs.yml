site_name: MEDHIRA AJV Utils
site_url: https://medhira-ajv-utils.readthedocs.io
site_description: Custom AJV formats and keywords for validation - Engineering Intelligence Across Everything
site_author: MEDHIRA Team

repo_url: https://github.com/HELLOMEDHIRA/medhira-ajv-utils
repo_name: HELLOMEDHIRA/medhira-ajv-utils

copyright: "Copyright &copy; 2024 MEDHIRA - Engineering Intelligence Across Everything"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  favicon: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  features:
    - navigation.top
    - navigation.tracking
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Formats:
      - All Formats: formats/all-formats.md
      - India Formats: formats/india-formats.md
      - Other Formats: formats/other-formats.md
  - Keywords:
      - decimalPrecision: keywords/decimalprecision.md
  - API Reference:
      - Functions: api/functions.md
  - About:
      - License: about/license.md
      - Contributing: about/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HELLOMEDHIRA
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/medhira
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/medhira
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/medhira-ajv-utils
  version: 0.0.1
  release: 0.0.1